name: Feature request
description: Propose a new capability or product improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Strong requests include a clear problem statement and success criteria.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user pain exists today?
      placeholder: What is hard, slow, or impossible right now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe behavior, not only implementation.
      placeholder: What should Nixelo do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or other options and why they are not enough.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checks that would make this done.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
